<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BARAH ADMIN | الإدارة العليا</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #0f1215; --card: #1a1d23; --text: #fff; --input-bg: #222; --danger: #ff4444; --info: #33b5e5; --success: #25D366;}
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        
        #loginSection { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .login-card { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 300px; }
        .login-card input { width: 100%; background: #222; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; outline: none; }
        
        #dashboardSection { display: none; width: 100%; max-width: 1100px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 12px; text-align: center; border-bottom: 3px solid var(--gold); }
        .stat-card .num { font-size: 2.2rem; color: var(--gold); font-weight: 900; margin: 0; }

        .form-card, .list-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; }
        .section-title { color: var(--gold); border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, textarea { width: 100%; padding: 12px; background: #222; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; font-family: 'Tajawal'; }
        
        .btn-add { background: var(--gold); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }

        .manage-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .unit-item { background: #111; border: 1px solid #333; border-radius: 15px; padding: 15px; position: relative; }
        .unit-item img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; border-radius: 20px; padding: 25px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <div id="loginSection">
        <div class="login-card">
            <h2 style="color:var(--gold);">دخول المدير</h2>
            <input type="text" id="username" placeholder="اسم المستخدم">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button onclick="checkLogin()" style="width:100%; padding:15px; background:var(--gold); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">دخول</button>
        </div>
    </div>

    <div id="dashboardSection">
        <div class="header">
            <h2>لوحة الإدارة العليا</h2>
            <button onclick="location.reload()" class="del-btn" style="background:var(--danger); color:#fff; border:none; padding:8px 20px; border-radius:5px; cursor:pointer;">خروج</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>إجمالي الوحدات</h3><p class="num" id="s-total">0</p></div>
            <div class="stat-card"><h3>وحدات المسوقين</h3><p class="num" id="s-agent-units">0</p></div>
            <div class="stat-card"><h3>عدد المسوقين</h3><p class="num" id="s-agents">0</p></div>
        </div>

        <div class="form-card">
            <h3 class="section-title"><i class="fas fa-plus-circle"></i> إضافة وحدة جديدة (أدمن)</h3>
            <div class="form-grid">
                <select id="adType"><option>بيع</option><option>إيجار</option></select>
                <select id="adDist">
                    <option>الحي الأول</option><option>الحي الثاني</option><option>الحي الثالث</option>
                    <option>إسكان الشباب</option><option>العبور الجديدة</option><option>جمعية أحمد عرابي</option>
                </select>
                <input type="number" id="adPrice" placeholder="السعر">
                <input type="number" id="adArea" placeholder="المساحة">
                <input type="number" id="adRooms" placeholder="الغرف">
                <input type="number" id="adBaths" placeholder="الحمامات">
            </div>
            <input type="text" id="adLoc" placeholder="رابط لوكيشن جوجل ماب (Location)" style="margin-top:10px;">
            <input type="text" id="adOwner" placeholder="رقم تليفون العميل (سري)" style="margin-top:10px;">
            <textarea id="adImages" placeholder="روابط الصور (مفصولة بفاصلة ,)" style="margin-top:10px;" rows="2"></textarea>
            <button class="btn-add" onclick="adminAddUnit()">نشر الوحدة كأدمن</button>
        </div>

        <div class="list-card">
            <h3 class="section-title"><i class="fas fa-user-tie"></i> إدارة المسوقين</h3>
            <div id="agentsContainer" style="display:grid; gap:10px; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));"></div>
        </div>

        <div class="list-card">
            <h3 class="section-title"><i class="fas fa-database"></i> كافة الوحدات المرفوعة</h3>
            <div id="unitsContainer" class="manage-grid"></div>
        </div>
    </div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <h2 id="m-title" style="color:var(--gold);"></h2>
            <div id="m-details"></div>
            <div id="m-images" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;"></div>
            <button onclick="closeModal()" style="width:100%; margin-top:20px; padding:10px; background:var(--danger); border:none; color:#fff; border-radius:8px;">إغلاق</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDBRcr-Np9SwYRR-cBqJDZ7FZmwk6VWLJU", 
            authDomain: "barah-realestate-c7095.firebaseapp.com", 
            projectId: "barah-realestate-c7095", 
            storageBucket: "barah-realestate-c7095.firebasestorage.app", 
            messagingSenderId: "491079034147", 
            appId: "1:491079034147:web:c7d985a6387dfa75a8d896" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function checkLogin() {
            if(document.getElementById('username').value==='admin' && document.getElementById('password').value==='AHE123') {
                document.getElementById('loginSection').style.display='none';
                document.getElementById('dashboardSection').style.display='block';
                loadAgents(); loadUnits();
            }
        }

        // إضافة وحدة بواسطة الأدمن
        function adminAddUnit() {
            const pCode = Math.floor(1000 + Math.random() * 9000);
            const data = {
                propertyCode: pCode,
                type: document.getElementById('adType').value,
                district: document.getElementById('adDist').value,
                price: document.getElementById('adPrice').value,
                area: document.getElementById('adArea').value,
                rooms: document.getElementById('adRooms').value,
                baths: document.getElementById('adBaths').value,
                locationLink: document.getElementById('adLoc').value,
                ownerPhone: document.getElementById('adOwner').value,
                images: document.getElementById('adImages').value.split(','),
                addedBy: 'Admin',
                createdAt: new Date()
            };
            db.collection("apartments").add(data).then(() => {
                alert("تم إضافة وحدتك بنجاح كود: #" + pCode);
                location.reload();
            });
        }

        function loadAgents() {
            db.collection("agents").onSnapshot(snap => {
                document.getElementById('s-agents').innerText = snap.size;
                const container = document.getElementById("agentsContainer");
                container.innerHTML = "";
                snap.forEach(doc => {
                    const a = doc.data();
                    container.innerHTML += `<div style="background:#222; padding:10px; border-radius:8px; border:1px solid #333;">
                        <b>${a.username}</b><br><small>${a.phone || ''}</small>
                        <button onclick="deleteAgent('${doc.id}')" style="background:none; border:none; color:red; cursor:pointer; float:left;">حذف</button>
                    </div>`;
                });
            });
        }

        function loadUnits() {
            db.collection("apartments").orderBy("createdAt", "desc").onSnapshot(snap => {
                const container = document.getElementById("unitsContainer");
                container.innerHTML = "";
                let total = 0, agentU = 0;
                snap.forEach(doc => {
                    total++;
                    const d = doc.data();
                    if(d.addedBy !== 'Admin') agentU++;
                    container.innerHTML += `
                        <div class="unit-item">
                            <div style="position:absolute; top:5px; right:5px; background:var(--gold); color:#000; padding:2px 8px; border-radius:5px; font-size:0.7rem;">#${d.propertyCode}</div>
                            <img src="${d.images[0]}">
                            <div style="margin-top:10px; font-weight:bold;">${d.district} - ${d.type}</div>
                            <div style="font-size:0.8rem; color:var(--info);">بواسطة: ${d.addedBy}</div>
                            <div style="display:flex; gap:5px; margin-top:10px;">
                                <button onclick="showFull('${doc.id}')" style="flex:1; padding:8px; background:var(--info); border:none; border-radius:5px; color:#fff; cursor:pointer;">تفاصيل</button>
                                <button onclick="deleteUnit('${doc.id}')" style="padding:8px; background:none; border:1px solid red; color:red; border-radius:5px; cursor:pointer;"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
                });
                document.getElementById('s-total').innerText = total;
                document.getElementById('s-agent-units').innerText = agentU;
            });
        }

        async function showFull(id) {
            const doc = await db.collection("apartments").doc(id).get();
            const d = doc.data();
            document.getElementById('m-title').innerText = `وحدة كود #${d.propertyCode}`;
            document.getElementById('m-details').innerHTML = `
                <p><b>السعر:</b> ${d.price} EGP</p>
                <p><b>المساحة:</b> ${d.area} م</p>
                <p><b>الغرف:</b> ${d.rooms} | <b>الحمامات:</b> ${d.baths}</p>
                <p><b>رقم المالك:</b> <span style="color:var(--danger)">${d.ownerPhone}</span></p>
                ${d.locationLink ? `<a href="${d.locationLink}" target="_blank" style="color:var(--success); text-decoration:none;"><i class="fas fa-map-marker-alt"></i> عرض الموقع على الخريطة</a>` : '<p>لا يوجد موقع محدد</p>'}
            `;
            document.getElementById('m-images').innerHTML = d.images.map(img => `<img src="${img}" style="width:100%; height:100px; object-fit:cover; border-radius:8px;">`).join('');
            document.getElementById('detailsModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('detailsModal').style.display = 'none'; }
        function deleteUnit(id) { if(confirm("حذف؟")) db.collection("apartments").doc(id).delete(); }
        function deleteAgent(id) { if(confirm("حذف المسوق؟")) db.collection("agents").doc(id).delete(); }
    </script>
</body>
</html>
