<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BARAH ESTATE | التفاصيل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">BARAH <span>ESTATE</span></a>
        <div class="nav-links"><a href="listings.html"><i class="fas fa-arrow-right"></i> رجوع للمعرض</a></div>
    </nav>

    <div class="container" id="content"><p style="text-align:center; font-size:1.5rem; color:var(--gold);">جاري تحميل التفاصيل <i class="fas fa-spinner fa-spin"></i></p></div>

    <div class="actions" id="actions" style="display:none;">
        <a href="#" class="btn wa" id="btnWa"><i class="fab fa-whatsapp"></i> تواصل واتساب</a>
        <a href="#" class="btn" id="btnCall" style="background:var(--gold); color:#000;"><i class="fas fa-phone"></i> اتصال هاتفي</a>
    </div>

    <div id="socialProof" class="social-proof-toast">
        <div class="social-proof-icon" id="spIcon"><i class="fas fa-fire"></i></div>
        <div class="social-proof-text" id="socialProofMsg">...</div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDBRcr-Np9SwYRR-cBqJDZ7FZmwk6VWLJU", authDomain: "barah-realestate-c7095.firebaseapp.com", projectId: "barah-realestate-c7095", storageBucket: "barah-realestate-c7095.firebasestorage.app", messagingSenderId: "491079034147", appId: "1:491079034147:web:c7d985a6387dfa75a8d896" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        let currentSlide = 0; let currentDistrict = '';

        if(id){
            db.collection("apartments").doc(id).get().then(doc => {
                if(doc.exists){
                    const d = doc.data(); currentDistrict = d.district;
                    const imgs = d.images && d.images.length ? d.images : ['https://via.placeholder.com/800'];
                    let slidesHtml = '';
                    imgs.forEach((src, i) => slidesHtml += `<img src="${src}" class="slide-img ${i===0?'active':''}" loading="lazy">`);
                    
                    let amHtml = '<p style="color:#777">لا توجد مميزات إضافية مسجلة.</p>';
                    if (d.amenities && d.amenities.length > 0) { amHtml = d.amenities.map(a => `<div class="am-tag"><i class="fas fa-check-circle"></i> ${a}</div>`).join(''); }

                    let videoHtml = '';
                    if(d.youtube) {
                        let videoId = '';
                        if(d.youtube.includes('v=')) { videoId = d.youtube.split('v=')[1].split('&')[0]; } 
                        else if(d.youtube.includes('youtu.be/')) { videoId = d.youtube.split('youtu.be/')[1].split('?')[0]; }
                        if(videoId) {
                            videoHtml = `
                                <h3 style="color:var(--gold); margin-top:30px;"><i class="fab fa-youtube"></i> فيديو الوحدة</h3>
                                <div style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:15px; border:1px solid var(--glass-border);">
                                    <iframe style="position:absolute; top:0; left:0; width:100%; height:100%;" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
                                </div>
                            `;
                        }
                    }

                    let statusBox = '';
                    if(d.status === 'sold') statusBox = `<div class="status-alert sold-alert"><i class="fas fa-times-circle"></i> عذراً، هذا العقار تم بيعه</div>`;
                    else if(d.status === 'rented') statusBox = `<div class="status-alert rented-alert"><i class="fas fa-info-circle"></i> عذراً، هذا العقار تم تأجيره</div>`;

                    const currentUrl = encodeURIComponent(window.location.href);
                    const shareText = encodeURIComponent(`شاهد هذا العقار الرائع من براح العقارية: ${d.title}`);

                    document.getElementById('content').innerHTML = `
                        <div class="slider">${slidesHtml}<div class="arrow left" onclick="move(-1)">❮</div><div class="arrow right" onclick="move(1)">❯</div></div>
                        <div class="top-badges">
                            <div style="flex:1;">${statusBox}</div>
                            <div class="share-btns">
                                <a href="https://wa.me/?text=${shareText}%0A${currentUrl}" target="_blank" class="share-btn share-wa" title="مشاركة واتساب"><i class="fab fa-whatsapp"></i></a>
                                <a href="https://www.facebook.com/sharer/sharer.php?u=${currentUrl}" target="_blank" class="share-btn share-fb" title="مشاركة فيسبوك"><i class="fab fa-facebook-f"></i></a>
                                <button onclick="copyLink()" class="share-btn share-copy" title="نسخ الرابط"><i class="fas fa-link"></i></button>
                            </div>
                        </div>
                        <div class="header-info">
                            <div class="price-tag">${Number(d.price).toLocaleString()} EGP <span style="font-size:1rem; color:#aaa; font-weight:normal;">(${d.type==='sale'?'تمليك':'إيجار'})</span></div>
                            <h1 class="main-title">${d.title}</h1>
                            <div style="color:var(--text-muted); font-size:1.1rem;"><i class="fas fa-map-marker-alt" style="color:var(--gold)"></i> ${d.district}</div>
                        </div>
                        <div class="specs">
                            <div class="spec-box"><i class="fas fa-bed"></i>${d.rooms} غرف</div>
                            <div class="spec-box"><i class="fas fa-bath"></i>${d.bathrooms} حمام</div>
                            <div class="spec-box"><i class="fas fa-ruler-combined"></i>${d.area} م²</div>
                            <div class="spec-box"><i class="fas fa-layer-group"></i>الدور ${d.floor}</div>
                        </div>
                        <h3 style="color:var(--gold)"><i class="fas fa-align-right"></i> وصف العقار</h3>
                        <div class="desc">${d.description}</div>
                        <h3 style="color:var(--gold)"><i class="fas fa-star"></i> المميزات والخدمات</h3>
                        <div class="amenities">${amHtml}</div>
                        ${videoHtml}
                        <div id="similarSection" style="margin-top:50px;">
                            <h3 style="color:var(--gold); border-bottom:1px solid var(--glass-border); padding-bottom:10px;"><i class="fas fa-home"></i> عقارات مشابهة في ${d.district}</h3>
                            <div class="similar-grid" id="similarGrid"><p style="color:#aaa;">جاري البحث...</p></div>
                        </div>
                    `;

                    if(!d.status || d.status === 'available') {
                        document.getElementById('actions').style.display = 'flex';
                        const phone = d.marketerPhone || '20110557821';
                        document.getElementById('btnWa').href = `https://wa.me/${phone}?text=مرحباً، أستفسر بخصوص الإعلان: ${d.title} %0Aالرابط: ${window.location.href}`;
                        document.getElementById('btnCall').href = `tel:${phone}`;
                    } else { document.getElementById('content').style.marginBottom = "20px"; }

                    loadSimilarProperties(); triggerSocialProof(currentDistrict);
                } else { document.getElementById('content').innerHTML = "<h2 style='text-align:center; color:red;'>عذراً، هذا الإعلان غير موجود.</h2>"; }
            });
        }
        function move(n) { const slides = document.querySelectorAll('.slide-img'); slides[currentSlide].classList.remove('active'); currentSlide = (currentSlide + n + slides.length) % slides.length; slides[currentSlide].classList.add('active'); }
        function copyLink() { navigator.clipboard.writeText(window.location.href).then(() => { alert("تم نسخ الرابط بنجاح!"); }); }
        
        function loadSimilarProperties() {
            db.collection("apartments").where("district", "==", currentDistrict).limit(4).get().then(snap => {
                let html = '';
                snap.forEach(doc => {
                    if(doc.id !== id) { 
                        const d = doc.data(); const img = (d.images && d.images.length) ? d.images[0] : 'https://via.placeholder.com/250';
                        html += `<a href="details.html?id=${doc.id}" class="sim-card"><img src="${img}" class="sim-img" loading="lazy"><div class="sim-body"><div class="sim-price">${Number(d.price).toLocaleString()} EGP</div><div style="font-size:0.9rem; margin-top:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${d.title}</div></div></a>`;
                    }
                });
                document.getElementById('similarGrid').innerHTML = html || '<p style="color:#aaa;">لا توجد عقارات أخرى في هذه المنطقة حالياً.</p>';
            });
        }

        function triggerSocialProof(districtName) {
            const toast = document.getElementById('socialProof'); const msgEl = document.getElementById('socialProofMsg'); const iconEl = document.getElementById('spIcon');
            function showToast() {
                const randomViewers = Math.floor(Math.random() * 4) + 2; const randomHours = Math.floor(Math.random() * 24) + 1; 
                const messages = [
                    { msg: `🔥 <strong>${randomViewers} أشخاص</strong> يتصفحون هذا العقار الآن!`, icon: '<i class="fas fa-fire" style="color:#ff9800"></i>' },
                    { msg: `⚡ تم حجز <strong>معاينة</strong> لهذه الوحدة اليوم.`, icon: '<i class="fas fa-calendar-check" style="color:#00C851"></i>' },
                    { msg: `👀 هذا العقار يلقى اهتماماً كبيراً في <strong>${districtName || 'هذه المنطقة'}</strong>.`, icon: '<i class="fas fa-eye" style="color:#33b5e5"></i>' },
                    { msg: `📈 تم بيع وحدة مشابهة منذ <strong>${randomHours} ساعة</strong>.`, icon: '<i class="fas fa-chart-line" style="color:var(--gold)"></i>' }
                ];
                const r = messages[Math.floor(Math.random() * messages.length)];
                iconEl.innerHTML = r.icon; msgEl.innerHTML = r.msg;
                toast.classList.add('show'); setTimeout(() => { toast.classList.remove('show'); }, 5000);
            }
            setTimeout(showToast, 4000); setInterval(showToast, 25000);
        }
    </script>
    <script src="main.js"></script>
</body>
</html>
