<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BARAH ESTATE | جولات سريعة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #000; }
        body { margin: 0; padding: 0; background: var(--bg); font-family: 'Tajawal'; color: #fff; overflow: hidden; }
        
        /* زر الرجوع العائم */
        .back-btn { position: fixed; top: 20px; right: 20px; z-index: 1000; background: rgba(0,0,0,0.5); color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.2rem; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px); }
        
        /* حاوية الريلز (Scroll Snapping) */
        .reels-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        .reels-container::-webkit-scrollbar { display: none; } /* إخفاء شريط التمرير */
        
        .reel-item { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #111; display: flex; justify-content: center; align-items: center; }
        
        /* فيديو اليوتيوب */
        .reel-video { width: 100%; height: 100vh; pointer-events: auto; }
        .reel-video iframe { width: 100%; height: 100%; border: none; }
        
        /* التفاصيل العائمة فوق الفيديو */
        .reel-info { position: absolute; bottom: 30px; right: 20px; left: 80px; z-index: 10; text-shadow: 0 2px 10px rgba(0,0,0,0.8); pointer-events: none; }
        .reel-price { color: var(--gold); font-size: 1.5rem; font-weight: 900; margin-bottom: 5px; }
        .reel-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; }
        .reel-dist { font-size: 0.9rem; color: #ddd; }
        
        /* أزرار التفاعل الجانبية */
        .reel-actions { position: absolute; bottom: 30px; left: 10px; z-index: 10; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .action-btn { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); color: #fff; width: 50px; height: 50px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; font-size: 1.2rem; backdrop-filter: blur(5px); transition: 0.3s; }
        .action-btn:hover { background: var(--gold); color: #000; border-color: var(--gold); transform: scale(1.1); }
        .action-btn span { font-size: 0.6rem; margin-top: 3px; font-weight: bold; }
        .wa-btn { background: #25D366; border-color: #25D366; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>

    <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>

    <div class="reels-container" id="reelsContainer">
        <div style="height: 100vh; display: flex; align-items: center; justify-content: center; color: var(--gold);">
            <h2>جاري تحميل الجولات... <i class="fas fa-spinner fa-spin"></i></h2>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDBRcr-Np9SwYRR-cBqJDZ7FZmwk6VWLJU", authDomain: "barah-realestate-c7095.firebaseapp.com", projectId: "barah-realestate-c7095", storageBucket: "barah-realestate-c7095.firebasestorage.app", messagingSenderId: "491079034147", appId: "1:491079034147:web:c7d985a6387dfa75a8d896" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // استخراج كود الفيديو من رابط يوتيوب
        function getYouTubeId(url) {
            let videoId = '';
            if(url.includes('v=')) videoId = url.split('v=')[1].split('&')[0];
            else if(url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split('?')[0];
            else if(url.includes('shorts/')) videoId = url.split('shorts/')[1].split('?')[0];
            return videoId;
        }

        db.collection("apartments").orderBy("createdAt", "desc").get().then(snap => {
            const container = document.getElementById('reelsContainer');
            let html = '';
            let hasVideos = false;

            snap.forEach(doc => {
                const d = doc.data();
                if(d.youtube && d.status !== 'sold' && d.status !== 'rented') {
                    hasVideos = true;
                    const videoId = getYouTubeId(d.youtube);
                    const phone = d.marketerPhone || '20110557821';
                    
                    html += `
                    <div class="reel-item">
                        <div class="reel-video">
                            <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=0&controls=0&rel=0&loop=1&playlist=${videoId}&modestbranding=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        </div>
                        
                        <div class="reel-info">
                            <div class="reel-price">${Number(d.price).toLocaleString()} EGP</div>
                            <div class="reel-title">${d.title}</div>
                            <div class="reel-dist"><i class="fas fa-map-marker-alt"></i> ${d.district}</div>
                        </div>

                        <div class="reel-actions">
                            <a href="details.html?id=${doc.id}" class="action-btn">
                                <i class="fas fa-info-circle"></i><span>تفاصيل</span>
                            </a>
                            <a href="https://wa.me/${phone}?text=مرحباً، شاهدت جولة الفيديو لعقار: ${d.title}" target="_blank" class="action-btn wa-btn">
                                <i class="fab fa-whatsapp"></i><span>حجز</span>
                            </a>
                        </div>
                    </div>`;
                }
            });

            if(hasVideos) {
                container.innerHTML = html;
            } else {
                container.innerHTML = `<div style="height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction:column; color: #aaa;">
                    <i class="fas fa-video-slash" style="font-size:3rem; margin-bottom:15px;"></i>
                    <h3>لا توجد جولات فيديو متاحة حالياً</h3>
                </div>`;
            }
        });
    </script>
</body>
</html>
