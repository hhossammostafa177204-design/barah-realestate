<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BARAH ADMIN | أرشيف الوحدات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #D4AF37;
            --bg: #0f1215;
            --card: #1a1d23;
            --text: #fff;
            --danger: #ff4444;
            --success: #00C851;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; padding: 20px;
            min-height: 100vh;
        }

        /* --- شاشة الدخول --- */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .login-box {
            background: var(--card); padding: 40px; border-radius: 15px; border: 1px solid var(--gold); text-align: center;
        }
        .login-input { padding: 10px; width: 200px; margin-bottom: 10px; border-radius: 5px; border: none; text-align: center; }
        .login-btn { padding: 10px 20px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }

        /* --- الهيدر والبحث --- */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px;
            flex-wrap: wrap; gap: 15px;
        }
        .search-box {
            flex: 1; max-width: 500px; position: relative;
        }
        .search-input {
            width: 100%; padding: 15px; border-radius: 50px; border: 1px solid #333;
            background: #222; color: #fff; padding-right: 50px; outline: none; font-family: 'Tajawal';
        }
        .search-icon { position: absolute; right: 20px; top: 15px; color: var(--gold); }
        
        .nav-btn {
            background: #333; color: #fff; padding: 10px 20px; text-decoration: none;
            border-radius: 8px; font-weight: bold; transition: 0.3s;
        }
        .nav-btn:hover { background: var(--gold); color: #000; }

        /* --- شبكة الكروت --- */
        .units-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px;
        }

        .unit-card {
            background: var(--card); border: 1px solid #333; border-radius: 15px;
            overflow: hidden; position: relative; transition: 0.3s;
        }
        .unit-card:hover { transform: translateY(-5px); border-color: var(--gold); }

        .card-img {
            width: 100%; height: 200px; object-fit: cover;
            border-bottom: 3px solid var(--gold);
        }
        
        .card-body { padding: 20px; }
        
        .price-tag {
            color: var(--gold); font-size: 1.4rem; font-weight: 900; margin-bottom: 5px;
        }
        .unit-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; line-height: 1.4; height: 50px; overflow: hidden; }
        
        .details-row {
            display: flex; justify-content: space-between; margin-bottom: 15px;
            background: #111; padding: 10px; border-radius: 8px; font-size: 0.9rem; color: #ccc;
        }

        .private-info {
            background: rgba(212, 175, 55, 0.1); border: 1px dashed var(--gold);
            padding: 15px; border-radius: 8px; margin-bottom: 15px;
        }
        .private-label { color: var(--gold); font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; display: block; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn {
            padding: 10px; border: none; border-radius: 5px; cursor: pointer;
            font-weight: bold; font-family: 'Tajawal'; display: flex; align-items: center; justify-content: center; gap: 5px;
            text-decoration: none; font-size: 0.9rem;
        }
        .btn-loc { background: #4285F4; color: #fff; }
        .btn-call { background: #25D366; color: #fff; }
        .btn-copy { background: #333; color: #fff; grid-column: span 2; }
        
        .btn:hover { opacity: 0.9; }

        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: stretch; }
            .units-grid { grid-template-columns: 1fr; }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color:var(--gold)">BARAH ARCHIVE</h2>
            <input type="password" id="adminPass" class="login-input" placeholder="كلمة المرور">
            <button class="login-btn" onclick="checkLogin()">دخول</button>
        </div>
    </div>

    <div id="mainContent" style="display:none;">
        <div class="header">
            <h2 style="color:var(--gold); margin:0;">أرشيف الوحدات الكامل</h2>
            
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="ابحث بالمنطقة، السعر، أو الكود..." onkeyup="filterUnits()">
            </div>

            <div style="display:flex; gap:10px;">
                <a href="admin.html" class="nav-btn"><i class="fas fa-plus"></i> إضافة وحدة</a>
                <a href="index.html" class="nav-btn" target="_blank"><i class="fas fa-globe"></i> الموقع</a>
            </div>
        </div>

        <div id="unitsContainer" class="units-grid">
            <p style="text-align:center; grid-column: 1/-1;">جاري تحميل البيانات...</p>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDBRcr-Np9SwYRR-cBqJDZ7FZmwk6VWLJU", authDomain: "barah-realestate-c7095.firebaseapp.com", projectId: "barah-realestate-c7095", storageBucket: "barah-realestate-c7095.firebasestorage.app", messagingSenderId: "491079034147", appId: "1:491079034147:web:c7d985a6387dfa75a8d896" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allUnits = [];

        // 1. التحقق من الدخول
        function checkLogin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === 'AHE123') {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                loadUnits();
            } else { alert("خطأ!"); }
        }

        // 2. تحميل البيانات
        function loadUnits() {
            db.collection("apartments").orderBy("createdAt", "desc").onSnapshot(snap => {
                allUnits = [];
                snap.forEach(doc => {
                    allUnits.push({ id: doc.id, ...doc.data() });
                });
                renderUnits(allUnits);
            });
        }

        // 3. عرض الكروت
        function renderUnits(units) {
            const container = document.getElementById("unitsContainer");
            container.innerHTML = "";

            if(units.length === 0) {
                container.innerHTML = "<p style='text-align:center; width:100%;'>لا توجد وحدات مطابقة.</p>";
                return;
            }

            units.forEach(unit => {
                const img = (unit.images && unit.images.length) ? unit.images[0] : 'https://via.placeholder.com/300';
                const locLink = unit.locationPrivate ? unit.locationPrivate : '#';
                const phone = unit.marketerPhone ? unit.marketerPhone : 'غير مسجل';

                container.innerHTML += `
                    <div class="unit-card">
                        <img src="${img}" class="card-img">
                        <div class="card-body">
                            <div class="price-tag">${unit.price.toLocaleString()} EGP</div>
                            <div class="unit-title">${unit.title}</div>
                            
                            <div class="details-row">
                                <span><i class="fas fa-ruler-combined"></i> ${unit.area} م²</span>
                                <span><i class="fas fa-bed"></i> ${unit.rooms} غرف</span>
                                <span><i class="fas fa-layer-group"></i> دور ${unit.floor}</span>
                            </div>

                            <div class="private-info">
                                <span class="private-label"><i class="fas fa-user-secret"></i> بيانات خاصة:</span>
                                <div><i class="fas fa-map-marker-alt"></i> ${unit.district}</div>
                                <div><i class="fas fa-phone"></i> المسوق: ${phone}</div>
                                <div style="font-size:0.8rem; margin-top:5px; color:#aaa;">${unit.description.substring(0, 50)}...</div>
                            </div>

                            <div class="action-btns">
                                <a href="${locLink}" target="_blank" class="btn btn-loc">
                                    <i class="fas fa-location-arrow"></i> اللوكيشن
                                </a>
                                <a href="tel:${phone}" class="btn btn-call">
                                    <i class="fas fa-phone"></i> اتصال
                                </a>
                                <button onclick="copyDetails('${unit.title}', '${unit.price}', '${unit.area}')" class="btn btn-copy">
                                    <i class="fas fa-copy"></i> نسخ التفاصيل للعميل
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // 4. البحث (Filter)
        function filterUnits() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allUnits.filter(u => 
                u.title.toLowerCase().includes(term) || 
                u.district.toLowerCase().includes(term) ||
                u.price.toString().includes(term)
            );
            renderUnits(filtered);
        }

        // 5. نسخ التفاصيل
        function copyDetails(title, price, area) {
            const text = `تفاصيل الوحدة:\n${title}\nالمساحة: ${area} متر\nالسعر: ${parseInt(price).toLocaleString()} جنيه\n\nللمعاينة: 0110557821`;
            navigator.clipboard.writeText(text).then(() => alert("تم نسخ التفاصيل!"));
        }
    </script>
</body>
</html>
