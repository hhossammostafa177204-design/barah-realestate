<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BARAH | بوابة الموظفين</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #0f1215; --card: #1a1d23; --text: #fff; --success: #25D366; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }

        /* صفحة الدخول والتسجيل */
        #authSection { height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #1a1d23 0%, #000 100%); }
        .auth-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #333; }
        .auth-tab { flex: 1; padding: 10px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .auth-tab.active { opacity: 1; border-bottom: 3px solid var(--gold); color: var(--gold); font-weight: bold; }

        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; text-align: center; outline: none; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; color: #000; }
        
        /* الواجهة الرئيسية */
        #mainDashboard { display: none; animation: fadeIn 0.5s; }
        .top-bar { display: flex; justify-content: space-between; padding: 15px 25px; background: #111; border-bottom: 1px solid #333; align-items: center; }
        
        .floating-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 50px; padding: 20px; }
        .float-card { 
            background: var(--card); width: 140px; height: 140px; border-radius: 25px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border: 1px solid rgba(212, 175, 55, 0.2); cursor: pointer; transition: 0.3s;
        }
        .float-card:hover { transform: translateY(-10px); border-color: var(--gold); background: #1d2127; }
        .float-card i { font-size: 2.2rem; color: var(--gold); margin-bottom: 12px; }
        .float-card span { font-weight: bold; font-size: 0.85rem; text-align: center; padding: 0 5px; }

        .icon-sale { border-bottom: 4px solid #25D366; }
        .icon-buy { border-bottom: 4px solid #33b5e5; }
        .icon-view { border-bottom: 4px solid var(--gold); }

        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="authSection">
        <div class="auth-card">
            <div class="auth-tabs">
                <div class="auth-tab active" id="tabL" onclick="showAuth('login')">دخول</div>
                <div class="auth-tab" id="tabS" onclick="showAuth('signup')">حساب جديد</div>
            </div>

            <div id="loginForm">
                <input type="text" id="lUser" placeholder="اسم المستخدم">
                <input type="password" id="lPass" placeholder="كلمة المرور">
                <button class="btn-main" onclick="handleLogin()">دخول النظام</button>
            </div>

            <div id="signupForm" class="hidden">
                <input type="text" id="sUser" placeholder="اسم مستخدم جديد">
                <input type="password" id="sPass" placeholder="كلمة مرور قوية">
                <input type="tel" id="sPhone" placeholder="رقم الموبايل">
                <button class="btn-main" style="background:var(--success)" onclick="handleSignup()">إنشاء الحساب</button>
            </div>
        </div>
    </div>

    <div id="mainDashboard">
        <div class="top-bar">
            <span>أهلاً: <b id="userDisplay" style="color:var(--gold);"></b></span>
            <button onclick="location.reload()" style="background:none; border:none; color:#ff4444; cursor:pointer;"><i class="fas fa-power-off"></i> خروج</button>
        </div>

        <div style="text-align:center; margin-top:30px;">
            <h2 style="color:var(--gold);">برح العقارية</h2>
            <p style="opacity:0.7;">اختر القسم المطلوب للبدء</p>
        </div>

        <div class="floating-container">
            <div class="float-card icon-sale" onclick="alert('جاري العمل على فورم إضافة العقار...')">
                <i class="fas fa-plus-circle"></i>
                <span>إضافة عقار للبيع</span>
            </div>
            <div class="float-card icon-buy" onclick="alert('جاري العمل على فورم طلبات الشراء...')">
                <i class="fas fa-hand-paper"></i>
                <span>إضافة طلب شراء</span>
            </div>
            <div class="float-card icon-view" onclick="alert('جاري العمل على صفحة عرض الوحدات...')">
                <i class="fas fa-th-list"></i>
                <span>الاطلاع على العقارات</span>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDBRcr-Np9SwYRR-cBqJDZ7FZmwk6VWLJU", 
            authDomain: "barah-realestate-c7095.firebaseapp.com", 
            projectId: "barah-realestate-c7095", 
            storageBucket: "barah-realestate-c7095.firebasestorage.app", 
            messagingSenderId: "491079034147", 
            appId: "1:491079034147:web:c7d985a6387dfa75a8d896" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // التبديل بين الدخول والتسجيل
        function showAuth(type) {
            if(type === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('signupForm').classList.add('hidden');
                document.getElementById('tabL').classList.add('active');
                document.getElementById('tabS').classList.remove('active');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('signupForm').classList.remove('hidden');
                document.getElementById('tabS').classList.add('active');
                document.getElementById('tabL').classList.remove('active');
            }
        }

        // إنشاء حساب
        async function handleSignup() {
            const u = document.getElementById('sUser').value.trim();
            const p = document.getElementById('sPass').value;
            const ph = document.getElementById('sPhone').value;

            if(!u || !p) return alert("يرجى ملء البيانات");

            const check = await db.collection("agents").where("username","==",u).get();
            if(!check.empty) return alert("الاسم مستخدم بالفعل");

            await db.collection("agents").add({
                username: u,
                password: p,
                phone: ph,
                createdAt: new Date()
            });
            alert("تم إنشاء حسابك! يمكنك الآن تسجيل الدخول");
            showAuth('login');
        }

        // تسجيل الدخول
        async function handleLogin() {
            const u = document.getElementById('lUser').value;
            const p = document.getElementById('lPass').value;

            const snap = await db.collection("agents").where("username","==",u).where("password","==",p).get();
            if(!snap.empty) {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('mainDashboard').style.display = 'block';
                document.getElementById('userDisplay').innerText = u;
            } else {
                alert("بيانات الدخول غير صحيحة");
            }
        }
    </script>
</body>
</html>
