<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BARAH ESTATE | المفضلة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">BARAH <span>ESTATE</span></a>
        <div class="nav-links">
            <a href="index.html">الرئيسية</a>
            <a href="listings.html">المعرض</a>
            <a href="favorites.html" class="active"><i class="fas fa-heart" style="color:var(--danger)"></i> المفضلة</a>
            <a href="contact.html">تواصل معنا</a>
        </div>
    </nav>

    <div class="page-header">
        <h1><i class="fas fa-heart" style="color:var(--danger)"></i> عقاراتك المفضلة</h1>
        <p>قائمة بالعقارات التي قمت بحفظها للرجوع إليها لاحقاً</p>
    </div>

    <div class="grid" id="favoritesGrid">
        <p style="text-align:center; grid-column:1/-1; font-size:1.2rem; color:var(--gold);">جاري تحميل مفضلتك <i class="fas fa-spinner fa-spin"></i></p>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDBRcr-Np9SwYRR-cBqJDZ7FZmwk6VWLJU", authDomain: "barah-realestate-c7095.firebaseapp.com", projectId: "barah-realestate-c7095", storageBucket: "barah-realestate-c7095.firebasestorage.app", messagingSenderId: "491079034147", appId: "1:491079034147:web:c7d985a6387dfa75a8d896" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let wishlist = JSON.parse(localStorage.getItem('barah_wishlist')) || [];
        const grid = document.getElementById('favoritesGrid');

        function showEmptyState() {
            grid.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-heart-broken"></i>
                    <h2>لم تقم بحفظ أي عقارات بعد!</h2>
                    <p>تصفح المعرض الآن واحفظ العقارات التي تناسبك لسهولة الوصول إليها.</p>
                    <a href="listings.html" class="btn-main">تصفح المعرض الآن</a>
                </div>
            `;
        }

        function loadFavorites() {
            if(wishlist.length === 0) { showEmptyState(); return; }
            const promises = wishlist.map(id => db.collection("apartments").doc(id).get());
            
            Promise.all(promises).then(docs => {
                grid.innerHTML = "";
                let hasValidItems = false;
                docs.forEach(doc => {
                    if(doc.exists) {
                        hasValidItems = true;
                        const u = doc.data(); const id = doc.id;
                        const img = (u.images && u.images.length > 0) ? u.images[0] : 'https://via.placeholder.com/300';
                        let icon = 'fas fa-building';
                        if(u.unitType === 'فيلا' || u.unitType === 'توين هاوس') icon = 'fas fa-home';
                        if(u.unitType === 'أرض') icon = 'fas fa-vector-square';

                        grid.innerHTML += `
                        <a href="details.html?id=${id}" class="card" id="card-${id}">
                            <div class="img-wrap">
                                <span class="badge">${u.type==='sale'?'تمليك':'إيجار'}</span>
                                <img src="${img}" class="card-img" loading="lazy">
                                <button class="remove-btn" onclick="removeFromWishlist(event, '${id}')" title="حذف من المفضلة"><i class="fas fa-trash-alt"></i></button>
                            </div>
                            <div class="card-body">
                                <div class="price">${Number(u.price).toLocaleString()} EGP</div>
                                <div class="title">${u.title}</div>
                                <div class="details">
                                    <span><i class="fas fa-map-marker-alt"></i> ${u.district}</span>
                                    <span><i class="${icon}"></i> ${u.unitType||'وحدة'}</span>
                                    <span><i class="fas fa-ruler-combined"></i> ${u.area}م</span>
                                </div>
                            </div>
                        </a>`;
                    } else {
                        wishlist = wishlist.filter(itemId => itemId !== doc.id);
                        localStorage.setItem('barah_wishlist', JSON.stringify(wishlist));
                    }
                });
                if(!hasValidItems) showEmptyState();
            }).catch(error => { grid.innerHTML = "<p style='text-align:center; grid-column:1/-1; color:red;'>حدث خطأ أثناء تحميل البيانات.</p>"; });
        }

        function removeFromWishlist(event, id) {
            event.preventDefault(); 
            wishlist = wishlist.filter(itemId => itemId !== id);
            localStorage.setItem('barah_wishlist', JSON.stringify(wishlist));
            const card = document.getElementById(`card-${id}`);
            card.style.transform = 'scale(0)'; card.style.opacity = '0';
            setTimeout(() => { card.remove(); if(wishlist.length === 0) showEmptyState(); }, 300);
        }
        window.onload = loadFavorites;
    </script>
    <script src="main.js"></script>
</body>
</html>
